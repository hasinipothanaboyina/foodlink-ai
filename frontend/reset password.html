<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | FoodLink AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; min-height: 100vh; background: #0a0a0a; }
        .bg-image {
            position: fixed; inset: 0;
            background-image: url('https://images.pexels.com/photos/6646918/pexels-photo-6646918.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover; background-position: center;
            filter: blur(6px) brightness(0.45); transform: scale(1.05); z-index: 0;
        }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 1rem 2rem; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .logo { color: #4ade80; text-decoration: none; font-size: 1.3rem; font-weight: 700; }
        .logo i { margin-right: 0.4rem; }
        .auth-container { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 5rem 1rem 2rem; }
        .auth-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 480px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-card h2 { color: #fff; margin: 0 0 0.3rem; font-size: 1.7rem; font-weight: 700; }
        .auth-card .subtitle { color: rgba(255,255,255,0.55); margin: 0 0 1.5rem; font-size: 0.95rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: rgba(255,255,255,0.8); font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-size: 0.95rem; box-sizing: border-box; transition: border 0.2s; }
        .form-control:focus { outline: none; border-color: #16a34a; background: rgba(255,255,255,0.15); }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 2.8rem; }
        .toggle-pw { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 0.95rem; padding: 0; }
        .toggle-pw:hover { color: rgba(255,255,255,0.8); }
        .btn-primary { width: 100%; padding: 0.85rem; background: #16a34a; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.75rem; transition: background 0.2s; }
        .btn-primary:hover { background: #15803d; }
        .btn-primary:disabled { background: #6b7280; cursor: not-allowed; }
        .auth-footer { text-align: center; margin-top: 1.2rem; color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .auth-footer a { color: #4ade80; text-decoration: none; font-weight: 600; }
        .error-banner {
            display: none;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.5);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            color: #fca5a5;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .error-banner.hidden { display: none !important; }
        .success-banner {
            display: none;
            background: rgba(22,163,74,0.15);
            border: 1px solid rgba(22,163,74,0.5);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            color: #86efac;
            font-size: 0.875rem;
            font-weight: 500;
            align-items: center;
            gap: 0.5rem;
        }
        .success-banner.visible { display: flex; }
        .lock-icon { text-align: center; margin-bottom: 1.2rem; }
        .lock-icon i { font-size: 2.5rem; color: #4ade80; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-leaf"></i> FoodLink</a>
    </nav>
    <div class="auth-container">
        <div class="auth-card">
            <div class="lock-icon">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2>Reset Your Password</h2>
            <p class="subtitle">Enter your new password below</p>

            <div class="error-banner hidden" id="resetError">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="resetErrorMsg">Something went wrong.</span>
            </div>
            <div class="success-banner" id="resetSuccess">
                <i class="fa-solid fa-circle-check"></i>
                <span id="resetSuccessMsg">Password reset successfully! Redirecting...</span>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-pw" onclick="togglePw('newPassword', this)"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="resetBtn">Reset Password &nbsp;<i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <div class="auth-footer">
                <p><a href="auth.html"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        function showError(msg) {
            const banner = document.getElementById('resetError');
            document.getElementById('resetErrorMsg').textContent = msg;
            banner.classList.remove('hidden');
            document.getElementById('resetSuccess').classList.remove('visible');
        }

        function hideError() {
            document.getElementById('resetError').classList.add('hidden');
        }

        function showSuccess(msg) {
            document.getElementById('resetSuccessMsg').textContent = msg;
            document.getElementById('resetSuccess').classList.add('visible');
            hideError();
        }

        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            btn.innerHTML = isText ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
        }

        // If no token in URL, show error immediately and disable form
        if (!token) {
            showError('Invalid or missing reset link.');
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            // Client-side validation — must match backend rules
            if (password.length < 8) {
                return showError('Password must be at least 8 characters.');
            }
            if (!/[A-Z]/.test(password)) {
                return showError('Password must contain at least one capital letter (A–Z).');
            }
            if (!/[0-9]/.test(password)) {
                return showError('Password must contain at least one number (0–9).');
            }
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                return showError('Password must contain at least one special character (@, #, $, ! …).');
            }
            if (password !== confirm) {
                return showError('Passwords do not match. Please re-enter.');
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting...';

            try {
                const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('Password reset successfully! Redirecting...');
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'auth.html';
                    }, 2000);
                } else {
                    showError(data.message || 'Failed to reset password. Please try again.');
                }
            } catch (err) {
                showError('Cannot connect to server. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Reset Password &nbsp;<i class="fa-solid fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
